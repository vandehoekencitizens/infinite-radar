<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Tracker</title>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XV0G29LDXM"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-XV0G29LDXM');
</script>
<link rel="icon" href="logo.png" type="image/png" />
<link rel="manifest" href="manifest.json" />
  <!-- CesiumJS -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.112/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.112/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="mode-radar">

  <!-- Cesium Map Container -->
  <div id="cesiumContainer"></div>

  <!-- Top Navigation Bar -->
  <div class="topbar glass-panel">
    <div class="brand">
      <span class="logo">✈</span>
      <h1>Infinite Tracker</h1>
    </div>
    
    <div class="modes">
      <button id="radarModeBtn" class="active">Radar</button>
      <button id="ifeModeBtn">IFE Split-Screen</button>
    </div>
    
    <div class="status-indicator mobile-hide">
      <span id="topMode">Radar Mode</span> • <span id="topServer">Not Connected</span>
    </div>
  </div>

  <!-- Left Control Panel -->
  <div class="control-shell glass-panel" id="controlShell">
    
    <div class="control-group">
      <label>Server</label>
      <select id="serverSelect">
        <option>Loading...</option>
      </select>
      <div class="btn-row">
        <button id="connectBtn" class="primary-btn">Connect</button>
        <button id="refreshBtn">↻</button>
      </div>
    </div>
    
    <!-- Flight Search -->
    <div class="control-group search-group">
      <label>Flight Search</label>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Search Callsign or User..." />
        <button id="searchBtn">🔍</button>
      </div>
    </div>

    <!-- Map Toggles -->
    <div class="control-group map-controls">
      <button id="openRandomBtn">🎲 Random Flight</button>
      <button id="followBtn">📷 Follow: OFF</button>
      <button id="labelsToggleBtn">Map Labels: ON</button>
      <button id="boundariesToggleBtn">Boundaries: ON</button>
    </div>

    <!-- Status Output -->
    <div class="status-bar" id="status">Ready.</div>
  </div>

  <button id="togglePanelBtn" class="floating-toggle glass-panel">Hide Panel</button>

  <!-- Right Drawer (Radar Mode Flight Info) -->
  <div class="drawer glass-panel" id="flightDrawer">
    <div class="drawer-header">
      <h2 id="fiCallsign">--</h2>
      <button id="drawerCloseBtn" class="close-btn">✕</button>
    </div>
    <p class="subtitle" id="fiUser">--</p>

    <div class="tabs">
      <button id="tabFlightInfo" class="tab-btn active">Flight Info</button>
      <button id="tabGlass" class="tab-btn">PFD View</button>
    </div>

    <div id="panelFlightInfo">
      <div class="data-grid">
        <div class="data-box">
          <label>Speed (GS)</label>
          <span id="fiSpd">-- kts</span>
        </div>
        <div class="data-box">
          <label>Altitude</label>
          <span id="fiAlt">-- ft</span>
        </div>
        <div class="data-box">
          <label>Heading</label>
          <span id="fiHdg">--°</span>
        </div>
        <div class="data-box">
          <label>Vert. Speed</label>
          <span id="fiVs">-- fpm</span>
        </div>
        <div class="data-box">
          <label>Latitude</label>
          <span id="fiLat">--</span>
        </div>
        <div class="data-box">
          <label>Longitude</label>
          <span id="fiLon">--</span>
        </div>
      </div>
    </div>

    <div id="panelGlass" class="hidden">
      <!-- Airliner PFD Injected by JS here -->
    </div>
  </div>

  <!-- Bottom Selected Strip -->
  <div class="selected-strip glass-panel" id="selectedStrip">
    <div class="strip-info">
      <h3 id="stripCallsign">--</h3>
      <span class="strip-type" id="stripType">--</span>
      <span class="strip-pilot" id="stripPilot">--</span>
    </div>
    <div class="strip-stats">
      <div>GS <strong id="stripGs">--</strong></div>
      <div>ALT <strong id="stripAlt">--</strong></div>
      <div>VS <strong id="stripVs">--</strong></div>
    </div>
  </div>

  <!-- IFE SPLIT SCREEN OVERLAY -->
  <div class="ife-overlay hidden" id="ifeOverlay">
    
    <!-- IFE Welcome Screen -->
    <div class="ife-welcome" id="ifeWelcome">
      <h1 id="welcomeCallsign">--</h1>
      <h2>Welcome Aboard</h2>
      <div class="route-codes">
        <span id="fromCode">DEP</span> ➔ <span id="toCode">ARR</span>
      </div>
      <button id="ifeStartBtn" class="primary-btn pulse-btn">Start In-Flight Entertainment</button>
      <button id="ifeCloseBtn" class="ghost-btn">Exit IFE</button>
    </div>

    <!-- IFE Main Panel -->
    <div class="ife-panel hidden" id="ifePanel">
      <div class="ife-header">
        <div>
          <h1 id="ifeTitle">--</h1>
          <p id="ifeSub">--</p>
        </div>
        <button id="changeViewBtn" class="secondary-btn">Toggle PFD</button>
      </div>

      <!-- IFE Flight Info View -->
      <div id="ifeFlightInfoView">
        <div class="data-grid large">
          <div class="data-box">
            <label>Speed (GS)</label>
            <span id="ifeSpd">-- kts</span>
          </div>
          <div class="data-box">
            <label>Altitude</label>
            <span id="ifeAlt">-- ft</span>
          </div>
          <div class="data-box">
            <label>Heading</label>
            <span id="ifeHdg">--°</span>
          </div>
          <div class="data-box">
            <label>Vert. Speed</label>
            <span id="ifeVs">-- fpm</span>
          </div>
        </div>

        <div class="route-card data-box">
          <div class="route-progress">
            <div class="route-point">
              <label>Departure</label>
              <strong id="ifeDep">DEP</strong>
            </div>
            <div class="route-point">
              <label>Arrival</label>
              <strong id="ifeArr">ARR</strong>
            </div>
          </div>
          <div id="ifeRoute" class="route-details">No route data</div>
        </div>
      </div>

      <!-- IFE Glass View -->
      <div id="ifeGlassView" class="hidden">
        <!-- Airliner PFD injected by JS here -->
      </div>
    </div>
  </div>

  <!-- Main Logic -->
  <script src="app.js"></script>
  
  <!-- Start the Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered!'))
          .catch(err => console.log('Service worker failed', err));
      });
    }
  </script>
</body>
</html>
